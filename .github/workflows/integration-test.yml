          git clone --depth=1 https://github.com/scipy/scipy /tmp/scipy
          git -C /tmp/scipy ls-files | grep '\.pyx$' | xargs -r cython-lint --no-pycodestyle

      - name: yt-project/yt
        continue-on-error: true
        run: |
          git clone --depth=1 https://github.com/yt-project/yt /tmp/yt
          git -C /tmp/yt ls-files | grep '\.pyx$' | xargs -r cython-lint --no-pycodestyle
