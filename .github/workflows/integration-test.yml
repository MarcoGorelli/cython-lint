name: integration-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install cython-lint
        run: pip install .

      - name: apache/arrow
        continue-on-error: true
        run: |
          git clone --depth=1 https://github.com/apache/arrow /tmp/arrow
          git -C /tmp/arrow ls-files | grep '\.pyx$' | xargs -r cython-lint --no-pycodestyle

      - name: rapidsai/cudf
        continue-on-error: true
        run: |
          git clone --depth=1 https://github.com/rapidsai/cudf /tmp/cudf
          git -C /tmp/cudf ls-files | grep '\.pyx$' | xargs -r cython-lint --no-pycodestyle

      - name: cupy/cupy
        continue-on-error: true
        run: |
          git clone --depth=1 https://github.com/cupy/cupy /tmp/cupy
          git -C /tmp/cupy ls-files | grep '\.pyx$' | xargs -r cython-lint --no-pycodestyle

      - name: MDAnalysis/mdanalysis
        continue-on-error: true
        run: |
          git clone --depth=1 https://github.com/MDAnalysis/mdanalysis /tmp/mdanalysis
          git -C /tmp/mdanalysis ls-files | grep '\.pyx$' | xargs -r cython-lint --no-pycodestyle

      - name: numpy/numpy
        continue-on-error: true
        run: |
          git clone --depth=1 https://github.com/numpy/numpy /tmp/numpy
